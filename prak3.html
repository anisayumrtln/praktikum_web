<!doctype html>
<html lang="id">
<head>
    <title>Image & Table</title>
</head>
<body>
    <h3>Daftar Barang</h3>
    <table border="1">
        <caption>Tabel Harga Produk</caption>
        <thead>
            <tr>
                <th>Kode Produk</th>
                <th>Nama Produk</th>
                <th>Harga</th>
                <th>Gambar</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>P001</td>
                <td>Kipas Angin</td>
                <td>400.000</td>
                <td><img src="kipasangin.jpg" width="145" height="150" alt="Kipas Angin"></td>
            </tr>
            <tr>
                <td>P002</td>
                <td>Lemari Es</td>
                <td>1.700.000</td>
                <td><img src="lemari_es.jpg" width="145" height="150" alt="Lemari Es"></td>
            </tr>
            <tr>
                <td>P003</td>
                <td>Mesin Cuci</td>
                <td>2.000.000</td>
                <td><img src="mesincuci.jpg" width="145" height="150" alt="Mesin Cuci"></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
